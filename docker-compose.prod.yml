# Production Docker Compose for Botmem
#
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   1. Copy .env.example to .env.prod and configure:
#      - POSTGRES_PASSWORD with a strong password
#      - APP_SECRET, JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, OAUTH_JWT_SECRET
#      - FRONTEND_URL / BASE_URL to your domain
#      - OLLAMA_BASE_URL to your Ollama host
#      - IMAGE_TAG to the desired version (e.g., v1.3.0)
#   2. Create a Caddyfile (see Caddyfile.example)
#
# Generate secrets: openssl rand -base64 48

services:
  api:
    image: ghcr.io/botmem/botmem:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.prod
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      typesense:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:12412/api/version || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: botmem
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: botmem
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U botmem -d botmem']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    env_file: .env.prod
    command: redis-server --appendonly yes --appendfsync everysec --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'sh', '-c', 'redis-cli -a $$REDIS_PASSWORD ping']
      interval: 5s
      timeout: 3s
      retries: 5

  typesense:
    image: typesense/typesense:30.1
    restart: unless-stopped
    volumes:
      - typesense-data:/data
    command: '--data-dir /data --api-key=${TYPESENSE_API_KEY:-botmem-ts-key} --enable-cors'
    healthcheck:
      test: ['CMD', 'bash', '-c', 'echo > /dev/tcp/localhost/8108']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./docs-site:/srv/docs:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  redis-data:
  typesense-data:
  caddy-data:
  caddy-config:
