# Production Docker Compose / Swarm Stack for Botmem
#
# Deploy with Docker Swarm for zero-downtime rolling updates:
#   docker swarm init                                    # one-time
#   source .env.prod && docker stack deploy -c docker-compose.prod.yml botmem
#
# Update config uses order: start-first — the new container starts and must
# pass health checks before the old one is stopped. If it fails, Swarm
# automatically rolls back.
#
# Prerequisites:
#   1. Copy .env.example to .env.prod and configure:
#      - POSTGRES_PASSWORD with a strong password
#      - APP_SECRET, JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, OAUTH_JWT_SECRET
#      - FRONTEND_URL / BASE_URL to your domain
#      - OLLAMA_BASE_URL to your Ollama host
#      - IMAGE_TAG to the desired version (e.g., v1.3.0)
#   2. Create a Caddyfile (see Caddyfile.example)
#
# Generate secrets: openssl rand -base64 48

services:
  api:
    image: ghcr.io/botmem/botmem:${IMAGE_TAG:-latest}
    env_file: .env.prod
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      DATABASE_URL: postgresql://botmem:${POSTGRES_PASSWORD}@postgres:5432/botmem
      REDIS_URL: redis://redis:6379
      TYPESENSE_URL: http://typesense:8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-botmem-ts-key}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      NODE_ENV: production
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:12412/api/version || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
        monitor: 30s
        delay: 5s
      rollback_config:
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: botmem
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: botmem
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U botmem -d botmem']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    deploy:
      restart_policy:
        condition: any
        delay: 5s

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      restart_policy:
        condition: any
        delay: 5s

  typesense:
    image: typesense/typesense:30.1
    volumes:
      - typesense-data:/data
    command: '--data-dir /data --api-key=${TYPESENSE_API_KEY:-botmem-ts-key} --enable-cors'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8108/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    deploy:
      restart_policy:
        condition: any
        delay: 5s

  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    deploy:
      restart_policy:
        condition: any
        delay: 5s

volumes:
  postgres-data:
  redis-data:
  typesense-data:
  caddy-data:
  caddy-config:
